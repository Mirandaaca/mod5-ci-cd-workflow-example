name: CI Pipeline Completo

on:
  push:
    branches: [main, jobs-en-paralelo-y-secuencia]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "24"

jobs:
  # ========= JOB 1: Lint =========
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm clean-install
      - run: npm run lint
  # ========= JOB 2: Test =========
  test:
    runs-on: ubuntu-latest
    needs: lint # Este job se ejecutara despues de que el job de lint haya finalizado correctamente
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm clean-install
      - name: Run Tests with Coverage
        run: npm run test:coverage
  # ========= JOB 3: Build =========
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test # Este job se ejecutara despues de que el job de test haya finalizado correctamente
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm clean-install
      - run: npm run build
